# ================================
# SERVIDOR
# ================================
server.port=${PORT:8080}

# ================================
# BASE DE DATOS - PostgreSQL
# ================================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ================================
# JPA / HIBERNATE
# ================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ================================
# FLYWAY - desactivado por ahora
# ================================
spring.flyway.enabled=false

# ================================
# JWT
# ================================
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}

# ================================
# CORS
# ================================
cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# ================================
# GOOGLE AUTH (ID Token flow — NO redirect, NO client_secret)
# ================================
google.client.id=${GOOGLE_CLIENT_ID}

# ================================
# EMAIL - Resend API
# ================================
resend.api.key=${RESEND_API_KEY}
resend.from=${RESEND_FROM}
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.security.oauth2.client.servlet.OAuth2ClientAutoConfiguration

# ================================
# SWAGGER / OPENAPI
# ================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# = [LOGGING] ===================
logging.level.com.eluxar=DEBUG
logging.level.org.springframework.security=INFO

# = [MULTIPART] =================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=30MB

# = [IMAGEKIT] ==================
imagekit.url-endpoint=${IMAGEKIT_URL_ENDPOINT}
imagekit.public-key=${IMAGEKIT_PUBLIC_KEY}
imagekit.private-key=${IMAGEKIT_PRIVATE_KEY}

# = [STABILITY AI] ==============
stability.api.key=${STABILITY_API_KEY}

# ================================
# CLOUDINARY - imagenes de productos
# ================================
cloudinary.cloud_name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api_key=${CLOUDINARY_API_KEY}
cloudinary.api_secret=${CLOUDINARY_API_SECRET}

# ================================
# MERCADO PAGO (Sandbox / Test)
# ================================
mercadopago.access-token=${MP_ACCESS_TOKEN}
mercadopago.public-key=${MP_PUBLIC_KEY}
