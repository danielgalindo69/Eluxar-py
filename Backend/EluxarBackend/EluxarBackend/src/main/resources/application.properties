# ================================
# SERVIDOR
# ================================
server.port=8080

# ================================
# BASE DE DATOS - PostgreSQL
# ================================
spring.datasource.url=jdbc:postgresql://localhost:5432/eluxar_db
spring.datasource.username=postgres
spring.datasource.password=2026
spring.datasource.driver-class-name=org.postgresql.Driver

# ================================
# JPA / HIBERNATE
# ================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ================================
# FLYWAY - desactivado por ahora
# ================================
spring.flyway.enabled=false

# ================================
# JWT
# ================================
jwt.secret=eluxar_secret_key_super_segura_2026_no_compartir
jwt.expiration=86400000

# ================================
# CORS
# ================================
cors.allowed-origins=http://localhost:3000,http://localhost:5173

# ================================
# SPRING SECURITY
# ================================
spring.security.oauth2.client.registration.google.client-id=placeholder
spring.security.oauth2.client.registration.google.client-secret=placeholder

# ================================
# MAIL - desactivado por ahora
# ================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=placeholder@gmail.com
spring.mail.password=placeholder
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration,org.springframework.boot.autoconfigure.freemarker.FreeMarkerAutoConfiguration

# ================================
# SWAGGER / OPENAPI
# ================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ================================
# LOGGING
# ================================
logging.level.com.eluxar=DEBUG
logging.level.org.springframework.security=INFO
